# =============================================================================
# Hades Messaging — cargo-deny configuration
# License, advisory, and source policy enforcement
# =============================================================================

[advisories]
vulnerability = "deny"
unmaintained = "warn"
unsound = "deny"
yanked = "deny"
notice = "warn"
ignore = [
    # Add accepted risk advisories here:
    # "RUSTSEC-YYYY-NNNN",
]

[licenses]
unlicensed = "deny"
copyleft = "deny"
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "0BSD",
    "BSL-1.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "MPL-2.0",
    "OpenSSL",
]
exceptions = [
    # Ring uses a custom ISC-style license
    { allow = ["Ring"], crate = "ring" },
]

[[licenses.clarify]]
crate = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
deny = [
    # Deny known problematic crates — enforce pure-Rust crypto
    { crate = "openssl", wrappers = [] },
    { crate = "openssl-sys", wrappers = [] },
]
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = [
    # Allow Arti git deps if needed during development
    # "https://gitlab.torproject.org/tpo/core/arti",
]
