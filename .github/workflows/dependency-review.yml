# =============================================================================
# Hades Messaging — Dependency Review
# Block PRs that introduce known-vulnerable or license-violating dependencies
# =============================================================================
name: Dependency Review

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Review Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-2.0-only, GPL-3.0-only, AGPL-3.0-only, AGPL-3.0-or-later
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, MPL-2.0, Unicode-DFS-2016, CC0-1.0, Unlicense, Zlib, BSL-1.0, 0BSD
          comment-summary-in-pr: always
          warn-on-openssf-scorecard-level: 3
          fail-on-scopes: runtime
