# =============================================================================
# Hades Messaging — Release Pipeline
# Full release: build, sign, attest, and publish APK/AAB with provenance
# =============================================================================
name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-beta.[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v1.0.0)"
        required: true
        type: string
      prerelease:
        description: "Mark as pre-release"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: "20"
  RUST_VERSION: "1.75"
  JAVA_VERSION: "17"

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Step 1: Validate tag and extract metadata
  # ═══════════════════════════════════════════════════════════════════════════
  metadata:
    name: Release Metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      date: ${{ steps.meta.outputs.date }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract metadata
        id: meta
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          DATE=$(date -u +%Y-%m-%d)

          if [[ "$TAG" =~ -(rc|beta|alpha)\. ]]; then
            PRERELEASE=true
          else
            PRERELEASE="${{ github.event.inputs.prerelease || 'false' }}"
          fi

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "prerelease=${PRERELEASE}" >> $GITHUB_OUTPUT
          echo "date=${DATE}" >> $GITHUB_OUTPUT

          echo "## Release Metadata" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | \`${TAG}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${VERSION}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Pre-release | \`${PRERELEASE}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Date | \`${DATE}\` |" >> $GITHUB_STEP_SUMMARY

      - name: Validate version consistency
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ "$CARGO_VERSION" != "$VERSION" ]; then
            echo "::error::Cargo.toml version ($CARGO_VERSION) != tag version ($VERSION)"
            exit 1
          fi
          PKG_VERSION=$(jq -r '.version' client/package.json)
          if [ "$PKG_VERSION" != "$VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) != tag version ($VERSION)"
            exit 1
          fi

  # ═══════════════════════════════════════════════════════════════════════════
  # Step 2: Run full CI checks
  # ═══════════════════════════════════════════════════════════════════════════
  ci-gate:
    name: CI Verification
    needs: metadata
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read
      checks: write
      pull-requests: read

  # ═══════════════════════════════════════════════════════════════════════════
  # Step 3: Security audit before release
  # ═══════════════════════════════════════════════════════════════════════════
  security-gate:
    name: Security Verification
    needs: metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Cargo audit
        run: cargo audit --deny warnings

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: client/package-lock.json
      - run: cd client && npm ci --ignore-scripts
      - name: npm audit
        run: cd client && npm audit --omit=dev --audit-level=high

  # ═══════════════════════════════════════════════════════════════════════════
  # Step 4: Build Android APKs and AAB
  # ═══════════════════════════════════════════════════════════════════════════
  build-android:
    name: Build Android (${{ matrix.target.abi }})
    needs: [ci-gate, security-gate, metadata]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        target:
          - abi: arm64-v8a
            rust-target: aarch64-linux-android
          - abi: armeabi-v7a
            rust-target: armv7-linux-androideabi
          - abi: x86_64
            rust-target: x86_64-linux-android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}
      - uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          sdkmanager --install "ndk;25.2.9519653"
          echo "NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ matrix.target.rust-target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: android-${{ matrix.target.abi }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: |
          cd client && npm ci --ignore-scripts
          cargo install tauri-cli

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > /tmp/hades-release.keystore

      - name: Create keystore.properties
        run: |
          mkdir -p gen/android
          cat > gen/android/keystore.properties << EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=hades
          storeFile=/tmp/hades-release.keystore
          EOF

      - name: Build APK
        run: |
          cd client
          npm run tauri android build -- --apk --target ${{ matrix.target.abi }}
        env:
          VITE_API_URL: https://relay.hades.im
          VITE_WS_URL: wss://relay.hades.im/v1/ws
          VITE_ENVIRONMENT: production
          VITE_FEATURE_CALLS: "true"
          VITE_FEATURE_ANONYMOUS: "true"

      - name: Build AAB (arm64 only)
        if: matrix.target.abi == 'arm64-v8a'
        run: |
          cd client
          npm run tauri android build -- --aab
        env:
          VITE_API_URL: https://relay.hades.im
          VITE_WS_URL: wss://relay.hades.im/v1/ws
          VITE_ENVIRONMENT: production
          VITE_FEATURE_CALLS: "true"
          VITE_FEATURE_ANONYMOUS: "true"

      - name: Verify APK signature
        run: |
          APK_PATH=$(find gen/android -name "*-release.apk" | head -1)
          if [ -n "$APK_PATH" ]; then
            $ANDROID_HOME/build-tools/34.0.0/apksigner verify --verbose --print-certs "$APK_PATH"
          fi

      - name: Collect artifacts
        run: |
          mkdir -p release-artifacts
          VERSION="${{ needs.metadata.outputs.version }}"
          ABI="${{ matrix.target.abi }}"
          APK_PATH=$(find gen/android -name "*-release.apk" | head -1)
          if [ -n "$APK_PATH" ]; then
            cp "$APK_PATH" "release-artifacts/hades-${VERSION}-${ABI}.apk"
          fi
          if [ "$ABI" = "arm64-v8a" ]; then
            AAB_PATH=$(find gen/android -name "*-release.aab" | head -1)
            if [ -n "$AAB_PATH" ]; then
              cp "$AAB_PATH" "release-artifacts/hades-${VERSION}.aab"
            fi
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ matrix.target.abi }}
          path: release-artifacts/
          retention-days: 7
          if-no-files-found: error

  # ═══════════════════════════════════════════════════════════════════════════
  # Step 5: Generate checksums, SBOM, and attestation
  # ═══════════════════════════════════════════════════════════════════════════
  provenance:
    name: Provenance & Attestation
    needs: [build-android, metadata]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    outputs:
      checksums-sha256: ${{ steps.checksums.outputs.hashes }}
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: List artifacts
        run: |
          echo "## Built Artifacts" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          find artifacts/ -type f | sort | while read f; do
            SIZE=$(du -h "$f" | cut -f1)
            echo "$(basename $f)  ($SIZE)"
          done >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Generate SHA-256 checksums
        id: checksums
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt
          echo "## SHA-256 Checksums" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat SHA256SUMS.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          HASHES=$(cat SHA256SUMS.txt | base64 -w0)
          echo "hashes=${HASHES}" >> $GITHUB_OUTPUT

      - name: Generate SHA-512 checksums
        run: |
          cd artifacts
          sha512sum *.apk *.aab 2>/dev/null > SHA512SUMS.txt || true
          cat SHA512SUMS.txt

      - name: Generate SBOM (Rust)
        run: |
          cargo install cargo-cyclonedx --locked
          cargo cyclonedx --all --format json
          cp bom.json artifacts/hades-${{ needs.metadata.outputs.version }}-sbom-rust.cdx.json 2>/dev/null || true

      - name: Generate SBOM (npm)
        run: |
          cd client
          npx @cyclonedx/cyclonedx-npm --output-file ../artifacts/hades-${{ needs.metadata.outputs.version }}-sbom-npm.cdx.json

      - name: Attest build provenance (APKs)
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "artifacts/*.apk"

      - name: Attest build provenance (AAB)
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "artifacts/*.aab"
        continue-on-error: true

      - name: Upload provenance artifacts
        uses: actions/upload-artifact@v4
        with:
          name: provenance
          path: |
            artifacts/SHA256SUMS.txt
            artifacts/SHA512SUMS.txt
            artifacts/*-sbom-*.cdx.json
          retention-days: 90

  # ═══════════════════════════════════════════════════════════════════════════
  # Step 6: Create GitHub Release
  # ═══════════════════════════════════════════════════════════════════════════
  release:
    name: Publish Release
    needs: [provenance, metadata, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-files/
          merge-multiple: true

      - name: Generate release notes
        id: changelog
        run: |
          TAG="${{ needs.metadata.outputs.tag }}"
          VERSION="${{ needs.metadata.outputs.version }}"
          DATE="${{ needs.metadata.outputs.date }}"
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          cat > RELEASE_NOTES.md << 'HEADER'
          # Hades Messaging

          **True Privacy is Sovereignty.**

          ---

          ## Downloads

          | File | Architecture | Size |
          |------|-------------|------|
          HEADER

          for f in release-files/*.apk release-files/*.aab; do
            [ -f "$f" ] || continue
            NAME=$(basename "$f")
            SIZE=$(du -h "$f" | cut -f1)
            echo "| \`${NAME}\` | $(echo $NAME | grep -oP '(arm64-v8a|armeabi-v7a|x86_64|universal)' || echo 'universal') | ${SIZE} |" >> RELEASE_NOTES.md
          done

          cat >> RELEASE_NOTES.md << MIDDLE

          ## Verification

          ### SHA-256 Checksums
          \`\`\`
          MIDDLE

          cat release-files/SHA256SUMS.txt >> RELEASE_NOTES.md 2>/dev/null || echo "See SHA256SUMS.txt" >> RELEASE_NOTES.md

          cat >> RELEASE_NOTES.md << VERIFY
          \`\`\`

          ### Verify with GitHub CLI
          \`\`\`bash
          # Download the APK
          gh release download ${TAG} -R Ashutosh0x/hades -p "*.apk"

          # Verify build provenance attestation
          gh attestation verify hades-*.apk -R Ashutosh0x/hades

          # Verify SHA-256
          sha256sum -c SHA256SUMS.txt
          \`\`\`

          ### Verify APK Signature
          \`\`\`bash
          apksigner verify --verbose --print-certs hades-*.apk
          \`\`\`

          ## Security

          - All dependencies audited with \`cargo audit\` and \`npm audit\`
          - Zero high/critical vulnerabilities at build time
          - APK signed with project release key (RSA-4096)
          - SLSA Build Level 3 provenance attached
          - CycloneDX SBOMs included for Rust and npm

          ## Build Environment

          | Component | Version |
          |-----------|---------|
          | Rust | 1.75+ |
          | Node.js | 20 LTS |
          | JDK | Temurin 17 |
          | NDK | 25.2.9519653 |
          | Android min SDK | 26 (Android 8.0) |
          | Target SDK | 34 (Android 14) |
          | Runner | ubuntu-latest |

          ## Cryptographic Protocol

          | Component | Implementation |
          |-----------|---------------|
          | Key Exchange | X25519 + ML-KEM-768 (PQXDH) |
          | Symmetric | ChaCha20-Poly1305 |
          | Hash | BLAKE3 |
          | KDF | HKDF-SHA256 |
          | Signatures | Ed25519 |
          | Sealed Sender | Double-sealed v2 |
          | Onion Routing | Arti 2.0 + Vanguards-v2 |
          VERIFY

          if [ -n "$PREV_TAG" ]; then
            echo "## Changes since ${PREV_TAG}" >> RELEASE_NOTES.md
            echo "" >> RELEASE_NOTES.md
            git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges >> RELEASE_NOTES.md
            echo "" >> RELEASE_NOTES.md
          fi

          cat >> RELEASE_NOTES.md << 'FOOTER'

          ---

          ## Documentation

          - [Cryptography Specification](docs/CRYPTOGRAPHY.md)
          - [Threat Model](docs/THREAT_MODEL.md)
          - [Contributing Guide](CONTRIBUTING.md)

          ## Security Reporting

          Found a vulnerability? **DO NOT** open a public issue.
          Email: **security@hades.im**

          ---

          **Built with care by the Hades team**
          FOOTER

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.metadata.outputs.tag }}
          name: "Hades ${{ needs.metadata.outputs.tag }}"
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ needs.metadata.outputs.prerelease == 'true' }}
          make_latest: ${{ needs.metadata.outputs.prerelease != 'true' }}
          files: |
            release-files/*.apk
            release-files/*.aab
            release-files/SHA256SUMS.txt
            release-files/SHA512SUMS.txt
            release-files/*-sbom-*.cdx.json
          fail_on_unmatched_files: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ═══════════════════════════════════════════════════════════════════════════
  # Step 7: Post-release verification
  # ═══════════════════════════════════════════════════════════════════════════
  verify-release:
    name: Verify Release
    needs: [release, metadata]
    runs-on: ubuntu-latest
    steps:
      - name: Verify release exists
        run: gh release view "${{ needs.metadata.outputs.tag }}" --repo Ashutosh0x/hades
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download and verify checksums
        run: |
          TAG="${{ needs.metadata.outputs.tag }}"
          mkdir verify && cd verify
          gh release download "$TAG" --repo Ashutosh0x/hades --pattern "*.apk" --pattern "SHA256SUMS.txt"
          if [ -f SHA256SUMS.txt ]; then
            echo "Verifying checksums..."
            sha256sum -c SHA256SUMS.txt
            echo "[PASS] All checksums verified"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify attestations
        run: |
          TAG="${{ needs.metadata.outputs.tag }}"
          mkdir -p attest-verify && cd attest-verify
          gh release download "$TAG" --repo Ashutosh0x/hades --pattern "*.apk"
          for apk in *.apk; do
            [ -f "$apk" ] || continue
            echo "Verifying attestation for $apk..."
            gh attestation verify "$apk" --repo Ashutosh0x/hades || echo "::warning::Attestation verification failed for $apk"
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Post summary
        run: |
          echo "## Release Verified" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** \`${{ needs.metadata.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** ${{ needs.metadata.outputs.date }}" >> $GITHUB_STEP_SUMMARY
          echo "**Pre-release:** ${{ needs.metadata.outputs.prerelease }}" >> $GITHUB_STEP_SUMMARY
