# =============================================================================
# Hades Messaging — NixOS Deployment Validation
# Validates the hardened relay server configuration
# =============================================================================
name: NixOS Config Check

on:
  push:
    paths:
      - "deployment/**"
      - ".github/workflows/nix-check.yml"
  pull_request:
    paths:
      - "deployment/**"

permissions:
  contents: read

jobs:
  nix-check:
    name: Validate NixOS Config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Check Nix syntax
        run: |
          for f in deployment/*.nix; do
            echo "Checking $f..."
            nix-instantiate --parse "$f" > /dev/null
          done

      - name: Evaluate configuration
        run: |
          nix-instantiate --eval --strict -E '
            let
              pkgs = import <nixpkgs> {};
            in
              builtins.tryEval (import ./deployment/configuration.nix { inherit pkgs; lib = pkgs.lib; config = {}; })
          ' || echo "::warning::NixOS config evaluation needs full system context"
