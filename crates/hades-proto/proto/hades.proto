syntax = "proto3";
package hades;

// ── Envelope ──

message SealedEnvelope {
  uint32 version = 1;
  bytes destination_circuit = 2;
  bytes ciphertext = 3;
  bytes sender_certificate = 4;
  optional uint64 server_timestamp = 5;
  bytes padding = 6;
}

// ── Key Exchange ──

message PrekeyBundle {
  bytes identity_key = 1;
  bytes identity_dh = 2;
  bytes signed_prekey = 3;
  bytes signed_prekey_signature = 4;
  uint32 signed_prekey_id = 5;
  optional OneTimePrekey one_time_prekey = 6;
  optional PqPrekey pq_prekey = 7;
}

message OneTimePrekey {
  uint32 key_id = 1;
  bytes public_key = 2;
}

message PqPrekey {
  uint32 key_id = 1;
  bytes encapsulation_key = 2;
  bytes signature = 3;
}

message PqxdhInitialMessage {
  bytes alice_identity_key = 1;
  bytes alice_identity_dh = 2;
  bytes alice_ephemeral = 3;
  uint32 bob_signed_prekey_id = 4;
  optional uint32 bob_one_time_prekey_id = 5;
  optional bytes pq_ciphertext = 6;
}

// ── Double Ratchet ──

message RatchetHeader {
  bytes dh_public = 1;
  uint32 counter = 2;
  uint32 previous_chain_length = 3;
  bool pq_step = 4;
}

message EncryptedMessage {
  RatchetHeader header = 1;
  bytes ciphertext = 2;
}

// ── Relay Messages ──

message ClientHello {
  bytes identity_proof = 1;
  bytes proof_of_work = 2;
  uint32 protocol_version = 3;
}

message ServerHello {
  bool accepted = 1;
  optional string error_code = 2;
  uint64 server_time = 3;
}

message DeliverEnvelope {
  SealedEnvelope envelope = 1;
}

message AckDelivery {
  bytes message_id = 1;
}

message FetchPrekeys {
  bytes target_identity = 1;
}

message PrekeyResponse {
  PrekeyBundle bundle = 1;
  uint32 remaining_one_time_prekeys = 2;
}

message UploadPrekeys {
  repeated OneTimePrekey one_time_prekeys = 1;
  optional PqPrekey pq_prekey = 2;
}

// ── Server Push ──

message ServerPush {
  oneof payload {
    DeliverEnvelope deliver = 1;
    PrekeyLowWarning prekey_low = 2;
    DeviceEvent device_event = 3;
  }
}

message PrekeyLowWarning {
  uint32 remaining = 1;
}

message DeviceEvent {
  uint32 device_id = 1;
  string event_type = 2; // "added", "removed", "key_changed"
}
